name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: observability
          POSTGRES_USER: observability
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U observability -d observability"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://observability:ci_password@localhost:5432/observability
      PYTHONPYCACHEPREFIX: /tmp/pfpd-ia-python-cache
      RUFF_CACHE_DIR: /tmp/pfpd-ia-ruff-cache
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Validate formatting
        run: ruff format --check .
      - name: Apply migrations
        run: alembic upgrade head
      - name: Run tests
        run: pytest -q
      - name: Validate Compose
        env:
          POSTGRES_DB: observability
          POSTGRES_USER: observability
          POSTGRES_PASSWORD: ci_password
        run: docker compose config --quiet
