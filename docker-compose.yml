services:
  postgres_observability:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - "127.0.0.1:5436:5432"
    volumes:
      - postgres_observability_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrate:
    build:
      context: .
      target: runtime
    environment:
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres_observability:
        condition: service_healthy
    profiles: ["tools"]

  mobility_collector:
    build:
      context: .
      target: runtime
    environment:
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
      MOBILITY_DATABASE_URL: ${MOBILITY_DATABASE_URL:-}
      MOBILITY_OWNER: ${MOBILITY_OWNER:-data-engineering}
      MOBILITY_ENVIRONMENT: ${MOBILITY_ENVIRONMENT:-local}
      MOBILITY_CRITICALITY: ${MOBILITY_CRITICALITY:-medium}
      MOBILITY_ERROR_MAX_LENGTH: ${MOBILITY_ERROR_MAX_LENGTH:-2000}
    command: ["python", "-m", "pfpd_ia.connectors.mobility.cli"]
    depends_on:
      postgres_observability:
        condition: service_healthy
    profiles: ["tools"]

  mobility_lineage_collector:
    build:
      context: .
      target: runtime
    environment:
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
      MOBILITY_DBT_MANIFEST_PATH: /artifacts/mobility/manifest.json
      MOBILITY_DBT_PROJECT_NAME: ${MOBILITY_DBT_PROJECT_NAME:-dbt_mobility}
    volumes:
      - type: bind
        source: ${MOBILITY_DBT_MANIFEST_HOST_PATH:-../data-pipeline-mobility/dbt_mobility/target/manifest.json}
        target: /artifacts/mobility/manifest.json
        read_only: true
    command: ["python", "-m", "pfpd_ia.connectors.mobility.lineage_cli"]
    depends_on:
      postgres_observability:
        condition: service_healthy
    profiles: ["tools"]

  api:
    build:
      context: .
      target: runtime
    environment:
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
    ports:
      - "127.0.0.1:8090:8000"
    depends_on:
      postgres_observability:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=2)
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  dashboard:
    build:
      context: .
      target: runtime
    environment:
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
      OPERATOR_NAME: ${OPERATOR_NAME:-}
    command:
      - streamlit
      - run
      - src/pfpd_ia/dashboard/app.py
      - --server.address=0.0.0.0
      - --server.port=8501
      - --server.headless=true
    ports:
      - "127.0.0.1:8501:8501"
    depends_on:
      postgres_observability:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=2)
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  test:
    build:
      context: .
      target: test
    environment:
      APP_ENVIRONMENT: test
      LOG_LEVEL: INFO
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
      PYTHONPYCACHEPREFIX: /tmp/python-cache
      RUFF_CACHE_DIR: /tmp/ruff-cache
    depends_on:
      postgres_observability:
        condition: service_healthy
    profiles: ["test"]

volumes:
  postgres_observability_data:
