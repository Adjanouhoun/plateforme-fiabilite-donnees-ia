services:
  postgres_observability:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - "127.0.0.1:5436:5432"
    volumes:
      - postgres_observability_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrate:
    build:
      context: .
      target: runtime
    environment:
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres_observability:
        condition: service_healthy
    profiles: ["tools"]

  api:
    build:
      context: .
      target: runtime
    environment:
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
    ports:
      - "127.0.0.1:8090:8000"
    depends_on:
      postgres_observability:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=2)
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  test:
    build:
      context: .
      target: test
    environment:
      APP_ENVIRONMENT: test
      LOG_LEVEL: INFO
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
      PYTHONPYCACHEPREFIX: /tmp/python-cache
      RUFF_CACHE_DIR: /tmp/ruff-cache
    depends_on:
      postgres_observability:
        condition: service_healthy
    profiles: ["test"]

volumes:
  postgres_observability_data:
